name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ['5.1', '5.2']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Lint opam files
        run: opam lint aimemory.opam

  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install ocamlformat
        run: opam install ocamlformat.0.29.0

      - name: Check formatting
        run: opam exec -- dune build @fmt

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Install bisect_ppx
        run: opam install bisect_ppx

      - name: Run tests with coverage
        run: opam exec -- dune runtest --instrument-with bisect_ppx

      - name: Generate coverage summary
        run: |
          COVERAGE_FILES=$(find _build -name '*.coverage' | tr '\n' ' ')
          echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$COVERAGE_FILES" ]; then
            opam exec -- bisect-ppx-report summary $COVERAGE_FILES >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No coverage data found.' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML report
        run: |
          COVERAGE_FILES=$(find _build -name '*.coverage' | tr '\n' ' ')
          if [ -n "$COVERAGE_FILES" ]; then
            opam exec -- bisect-ppx-report html -o _coverage $COVERAGE_FILES
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: _coverage/
