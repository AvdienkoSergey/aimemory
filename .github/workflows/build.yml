name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build
        run: opam exec -- dune build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aimemory-linux-x86_64
          path: _build/default/bin/main.exe
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build
        run: opam exec -- dune build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aimemory-macos-arm64
          path: _build/default/bin/main.exe
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build
        run: opam exec -- dune build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aimemory-windows-x86_64
          path: _build/default/bin/main.exe
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Rename binaries with platform suffix
          if [ -f artifacts/aimemory-linux-x86_64/main.exe ]; then
            cp artifacts/aimemory-linux-x86_64/main.exe release/aimemory-linux-x86_64
          fi
          if [ -f artifacts/aimemory-macos-arm64/main.exe ]; then
            cp artifacts/aimemory-macos-arm64/main.exe release/aimemory-macos-arm64
          fi
          if [ -f artifacts/aimemory-windows-x86_64/main.exe ]; then
            cp artifacts/aimemory-windows-x86_64/main.exe release/aimemory-windows-x86_64.exe
          fi
          ls -la release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
